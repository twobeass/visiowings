name: Feature Request
description: Propose a new feature or enhancement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does it matter?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Sketch the user-facing behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you didn't pick them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples from other tools, related issues, etc.

  - type: checkboxes
    id: search
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions for similar proposals
          required: true
