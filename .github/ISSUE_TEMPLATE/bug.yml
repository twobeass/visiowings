name: Bug Report
description: Report a defect, crash, or unexpected behavior
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much detail as you can.
        Run `visiowings --debug ...` if relevant and paste the full output.

  - type: input
    id: version
    attributes:
      label: visiowings version
      description: Output of `visiowings --version` or `pip show visiowings`
      placeholder: "0.6.1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.4"
    validations:
      required: true

  - type: input
    id: visio-version
    attributes:
      label: Microsoft Visio version
      placeholder: "Visio Professional 2021 / Microsoft 365"
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: locale-codepage
    attributes:
      label: System locale / codepage
      description: Output of `python -c "import locale; print(locale.getlocale(), locale.getpreferredencoding())"`
      placeholder: "('German_Germany', '1252'), cp1252"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Visio document `foo.vsdm`
        2. Run `visiowings edit foo.vsdm`
        3. Edit module `Module1.bas`
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Run with `--debug` and paste full output. Will be auto-formatted as code.
      render: shell

  - type: checkboxes
    id: search
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I tried with the latest released version
          required: true
