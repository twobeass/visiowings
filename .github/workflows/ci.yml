name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  FORCE_COLOR: "1"

jobs:
  # --------------------------------------------------------------------
  # Pre-commit (covers ruff/format/mypy/codespell/gitleaks/validate-pyproject)
  # --------------------------------------------------------------------
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color always

  # --------------------------------------------------------------------
  # Lint
  # --------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.6.0

      - name: ruff check
        run: ruff check --output-format=github .

      - name: ruff format --check
        run: ruff format --check .

  # --------------------------------------------------------------------
  # Type-check
  # --------------------------------------------------------------------
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + type stubs
        run: |
          pip install -e ".[dev]"

      - name: mypy
        run: mypy visiowings/

  # --------------------------------------------------------------------
  # Test matrix
  # --------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov-report=xml --junitxml=junit-${{ matrix.os }}-${{ matrix.python-version }}.xml -m "not windows_only"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-${{ matrix.python-version }}
          path: junit-*.xml
          if-no-files-found: ignore
          retention-days: 7

  # --------------------------------------------------------------------
  # Security scans
  # --------------------------------------------------------------------
  security:
    name: Security (pip-audit + bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + scanners
        run: |
          pip install -e .
          pip install pip-audit "bandit[toml]"

      - name: Audit installed dependencies
        run: pip-audit --strict

      - name: Run bandit
        run: bandit -r visiowings/ -ll -f json -o bandit-report.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: moderate

  # --------------------------------------------------------------------
  # Build sdist + wheel
  # --------------------------------------------------------------------
  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel
          path: dist/
          retention-days: 7

  # --------------------------------------------------------------------
  # Aggregate gate (single required-status-check for branch protection)
  # --------------------------------------------------------------------
  gate:
    name: CI gate
    if: always()
    needs:
      - pre-commit
      - lint
      - type-check
      - test
      - security
      - build-wheel
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_CONTEXT"
          if echo "$NEEDS_CONTEXT" | grep -E '"result":\s*"(failure|cancelled)"' > /dev/null; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
