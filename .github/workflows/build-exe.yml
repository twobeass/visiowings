name: Build EXE

on:
  workflow_dispatch:
  release:
    types: [published]
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded EXE artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

concurrency:
  group: build-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required for action-gh-release

jobs:
  build:
    name: Build standalone EXE
    runs-on: windows-latest
    outputs:
      artifact-name: visiowings-exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller>=6.0

      - name: Verify CLI imports
        shell: pwsh
        run: visiowings --help

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: pyinstaller visiowings.spec --clean --noconfirm

      - name: Smoke-test the built EXE
        shell: pwsh
        run: |
          dist\visiowings.exe --help
          if ($LASTEXITCODE -ne 0) {
            Write-Error "EXE smoke test failed"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: visiowings-exe
          path: dist/visiowings.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/visiowings.exe
          fail_on_unmatched_files: true
